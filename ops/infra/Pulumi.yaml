name: infra
description: A minimal TypeScript Pulumi program
runtime:
  name: nodejs
  options:
    packagemanager: pnpm
config:
  pulumi:tags:
    value:
      pulumi:template: typescript
packages:
  railway:
    source: terraform-provider
    version: 1.1.1
    parameters:
      - terraform-community-providers/railway
  neon:
    source: terraform-provider
    version: 1.1.1
    parameters:
      - kislerdm/neon
