name: infra
description: A minimal AWS TypeScript Pulumi program
runtime:
  name: nodejs
  options:
    packagemanager: pnpm
config:
  pulumi:tags:
    value:
      pulumi:template: aws-typescript
packages:
  railway:
    source: terraform-provider
    version: 1.1.1
    parameters:
      - terraform-community-providers/railway
