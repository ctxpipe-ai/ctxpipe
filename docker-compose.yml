services:
  deps-install:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    working_dir: /app
    command: sh -c "bunx pnpm install"
    volumes:
      - .:/app
      - shared_node_modules:/app/node_modules
      - backend_bun_app_node_modules:/app/apps/backend/node_modules
      - ui_bun_app_node_modules:/app/apps/ui/node_modules
      - codesearch_bun_app_node_modules:/app/apps/codesearch/node_modules
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ctxpipe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ctxpipe}
      POSTGRES_DB: ${POSTGRES_DB:-ctxpipe}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  falkordb:
    image: falkordb/falkordb:latest
    restart: unless-stopped
    environment:
      FALKORDB_ARGS: "BOLT_PORT 7687"
    ports:
      - "6379:6379"
      - "7687:7687"
      - "3003:3000" # admin UI

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    env_file:
      - path: ./apps/otel-collector/.env
        required: false
      - path: ./apps/otel-collector/.env.local
        required: false
    volumes:
      - ./apps/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    command: ["--config", "/etc/otelcol/config.yaml"]
    ports:
      - "4318:4318"

  backend-bun:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    working_dir: /app
    command: sh -c "bunx pnpm --filter @ctxpipe/backend dev"
    environment:
      DATABASE_URL: postgresql://ctxpipe:ctxpipe@postgres:5432/ctxpipe
      GRAPH_DB_URI: redis://falkordb:6379
      UI_PROXY_URL: http://ui-bun:3002
      PORT: ${PORT:-3000}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://otel-collector:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://otel-collector:4318/v1/metrics
      OTEL_SERVICE_NAME: backend
    volumes:
      - .:/app
      - shared_node_modules:/app/node_modules
      - backend_bun_app_node_modules:/app/apps/backend/node_modules
    ports:
      - "3000:3000"
    depends_on:
      deps-install:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_started

  ui-bun:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile.dev
    working_dir: /app
    command: sh -c "bunx pnpm --filter @ctxpipe/ui dev"
    environment:
      PORT: 3002
    volumes:
      - .:/app
      - shared_node_modules:/app/node_modules
      - ui_bun_app_node_modules:/app/apps/ui/node_modules
    ports:
      - "3002:3002"
    depends_on:
      deps-install:
        condition: service_completed_successfully

  codesearch-bun:
    build:
      context: .
      dockerfile: apps/codesearch/Dockerfile.dev
    working_dir: /app
    command: sh -c "bunx pnpm --filter @ctxpipe/codesearch dev"
    environment:
      DATABASE_URL: postgresql://ctxpipe:ctxpipe@postgres:5432/ctxpipe
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      PORT: 3001
    volumes:
      - .:/app
      - shared_node_modules:/app/node_modules
      - codesearch_bun_app_node_modules:/app/apps/codesearch/node_modules
      - zoekt_index:/data/zoekt-index
      - repo_cache:/data/repo-cache
    ports:
      - "3001:3001"
    depends_on:
      deps-install:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      zoekt-webserver:
        condition: service_started

  zoekt-webserver:
    build:
      context: .
      dockerfile: apps/codesearch/Dockerfile.dev
    working_dir: /app
    command: sh -c "zoekt-webserver -index /data/zoekt-index -rpc -listen :6070"
    volumes:
      - zoekt_index:/data/zoekt-index

volumes:
  shared_node_modules:
  backend_bun_app_node_modules:
  ui_bun_app_node_modules:
  codesearch_bun_app_node_modules:
  zoekt_index:
  repo_cache:
