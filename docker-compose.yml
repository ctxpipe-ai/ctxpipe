services:
  deps-install:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    working_dir: /app
    command: sh -c "bunx pnpm install"
    volumes:
      - .:/app
      - shared_node_modules:/app/node_modules
      - backend_bun_app_node_modules:/app/apps/backend/node_modules
      - ui_bun_app_node_modules:/app/apps/ui/node_modules
      - codesearch_bun_app_node_modules:/app/apps/codesearch/node_modules
    restart: "no"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ctxpipe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ctxpipe}
      POSTGRES_DB: ${POSTGRES_DB:-ctxpipe}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      # Format: username/password
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/ctxpipe-dev}
    ports:
      - "7474:7474"
      - "7687:7687"

  backend-bun:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    working_dir: /app
    command: sh -c "bunx pnpm --filter @ctxpipe/backend dev"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ctxpipe:ctxpipe@postgres:5432/ctxpipe}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      UI_PROXY_URL: ${UI_PROXY_URL:-http://ui-bun:3002}
      PORT: ${PORT:-3000}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-https://localhost:3000}
      AUTH_ALLOWED_ORIGINS: ${AUTH_ALLOWED_ORIGINS:-}
      SMTP_CONNECTION_URL: ${SMTP_CONNECTION_URL:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
    volumes:
      - .:/app
      - shared_node_modules:/app/node_modules
      - backend_bun_app_node_modules:/app/apps/backend/node_modules
    ports:
      - "3000:3000"
    depends_on:
      deps-install:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started

  ui-bun:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile.dev
    working_dir: /app
    command: sh -c "bunx pnpm --filter @ctxpipe/ui dev"
    environment:
      PORT: 3002
    volumes:
      - .:/app
      - shared_node_modules:/app/node_modules
      - ui_bun_app_node_modules:/app/apps/ui/node_modules
    ports:
      - "3002:3002"
    depends_on:
      deps-install:
        condition: service_completed_successfully

  codesearch-bun:
    build:
      context: .
      dockerfile: apps/codesearch/Dockerfile.dev
    working_dir: /app
    command: sh -c "bunx pnpm --filter @ctxpipe/codesearch dev"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ctxpipe:ctxpipe@postgres:5432/ctxpipe}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      PORT: 3001
    volumes:
      - .:/app
      - shared_node_modules:/app/node_modules
      - codesearch_bun_app_node_modules:/app/apps/codesearch/node_modules
      - zoekt_index:/data/zoekt-index
      - repo_cache:/data/repo-cache
    ports:
      - "3001:3001"
    depends_on:
      deps-install:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      zoekt-webserver:
        condition: service_started

  zoekt-webserver:
    build:
      context: .
      dockerfile: apps/codesearch/Dockerfile.dev
    working_dir: /app
    command: sh -c "zoekt-webserver -index /data/zoekt-index -rpc -listen :6070"
    volumes:
      - zoekt_index:/data/zoekt-index

volumes:
  shared_node_modules:
  backend_bun_app_node_modules:
  ui_bun_app_node_modules:
  codesearch_bun_app_node_modules:
  zoekt_index:
  repo_cache:
