modules:
  confluence:globalSettings:
    - key: ctxpipe-agent-hello-world-global-settings
      resource: main
      render: native
      resolver:
        function: resolver
      title: ctxpipe agent
  function:
    - key: resolver
      handler: index.handler
  trigger:
    - key: ctxpipe-remote-forge-installed
      endpoint: ctxpipe-remote-events
      events:
        - avi:forge:installed:app
    - key: ctxpipe-remote-forge-upgraded
      endpoint: ctxpipe-remote-events
      events:
        - avi:forge:upgraded:app
    - key: ctxpipe-remote-forge-uninstalled
      endpoint: ctxpipe-remote-events
      events:
        - avi:forge:uninstalled:app
  endpoint:
    - key: ctxpipe-remote-events
      remote: ctxpipe-backend
      route:
        path: /api/v1/webhook/atlassian/forge
      auth:
        appSystemToken:
          enabled: true
resources:
  - key: main
    path: src/frontend/index.jsx
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/4ce198e3-2ce7-4a6e-865f-a3e31d15fe43
remotes:
  - key: ctxpipe-backend
    baseUrl: https://forge-remote-refapp-nodejs.services.atlassian.com
permissions:
  scopes:
    - read:app-system-token
    - read:confluence-content.summary
