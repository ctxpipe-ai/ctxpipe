modules:
  confluence:globalSettings:
    - key: ctxpipe-agent-hello-world-global-settings
      resource: main
      render: native
      resolver:
        function: resolver
      title: ctxpipe agent
  function:
    - key: resolver
      handler: index.handler
  trigger:
    - key: ctxpipe-remote-forge-lifecycle
      endpoint: ctxpipe-remote-events
      events:
        - avi:forge:installed:app
        - avi:forge:upgraded:app
        - avi:forge:uninstalled:app
  endpoint:
    - key: ctxpipe-remote-events
      remote: ctxpipe-backend
      route:
        path: /api/v1/webhook/atlassian/forge
      auth:
        appSystemToken:
          enabled: true
resources:
  - key: main
    path: src/frontend/index.jsx
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/4ce198e3-2ce7-4a6e-865f-a3e31d15fe43
remotes:
  - key: ctxpipe-backend
   # for local testing we use ./scripts/ngrok-tunnel.sh to forward to our backend
   # The below URL is the ngrok URL for the tunnel
    baseUrl: https://janel-chordamesodermic-jodee.ngrok-free.dev
permissions:
  scopes:
    - read:app-system-token
    - read:space:confluence
    - read:page:confluence
    - read:confluence-content.summary
