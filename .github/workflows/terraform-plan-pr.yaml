# Terraform speculative plans on infra PRs.
#
# Security: terraform plan executes provider/external code with secrets present. Assign this job to a
# GitHub Environment named below and enable required reviewers under repo Settings → Environments

name: Terraform Infra Plan (PR)

on:
  pull_request:
    paths:
      - "infra/**"

concurrency:
  group: terraform-infra-plan

defaults:
  run:
    working-directory: infra

jobs:
  terraform-plan:
    name: Terraform Plan (PR)
    runs-on: blacksmith-4vcpu-ubuntu-2404

    # Only branches on this repository (not forks). Fork PRs lack secrets anyway; this avoids noise.
    if: github.event.pull_request.head.repo.full_name == github.repository

    # Required reviewers → Settings → Environments → terraform-plan
    environment: terraform-plan

    permissions:
      contents: read
      pull-requests: write

    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_image_tag: ${{ github.event.pull_request.base.sha }}
      TF_VAR_better_auth_secret: ${{ secrets.BETTER_AUTH_SECRET }}
      TF_VAR_langsmith_api_key: ${{ secrets.LANGSMITH_API_KEY }}
      TF_VAR_model_provider_api_key: ${{ secrets.MODEL_PROVIDER_API_KEY }}
      TF_VAR_model_provider: ${{ vars.MODEL_PROVIDER || 'openrouter' }}
      TF_VAR_smtp_connection_url: ${{ secrets.SMTP_CONNECTION_URL }}
      TF_VAR_github_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      TF_VAR_github_client_secret: ${{ secrets.GH_CLIENT_SECRET }}
      TF_VAR_github_webhook_secret: ${{ secrets.GH_WEBHOOK_SECRET }}
      TF_VAR_atlassian_client_id: ${{ secrets.ATLASSIAN_CLIENT_ID }}
      TF_VAR_atlassian_client_secret: ${{ secrets.ATLASSIAN_CLIENT_SECRET }}
      TF_VAR_falkordb_password: ${{ secrets.FALKORDB_PASSWORD }}
      TF_VAR_better_stack_token: ${{ secrets.BETTER_STACK_TOKEN }}
      TF_VAR_langfuse_auth_string: ${{ secrets.LANGFUSE_AUTH_STRING }}
      TF_VAR_langfuse_otlp_endpoint: ${{ secrets.LANGFUSE_OTLP_ENDPOINT }}
      TF_VAR_amplitude_api_key: ${{ secrets.AMPLITUDE_API_KEY }}
      TF_VAR_amplitude_region: ${{ secrets.AMPLITUDE_REGION || 'us' }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

    steps:
      - name: Checkout repository
        uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b # v1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.14.7

      - name: Terraform Init
        run: terraform init -backend-config="access_key=$R2_ACCESS_KEY_ID" -backend-config="secret_key=$R2_SECRET_ACCESS_KEY" -backend-config="key=production/terraform.tfstate"

      - name: Terraform Plan
        id: plan
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          command: |
            set -euo pipefail
            cd "${GITHUB_WORKSPACE}/infra"
            terraform plan -no-color -input=false > "${GITHUB_WORKSPACE}/infra/plan.txt"

      - name: Generate Terraform Plan Comment
        if: always()
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/infra"
          max_bytes=65536
          truncated_note=""
          if [[ -f plan.txt ]]; then
            size=$(wc -c < plan.txt | tr -d ' ')
            if [[ "$size" -gt "$max_bytes" ]]; then
              head -c "$max_bytes" plan.txt > plan.tmp && mv plan.tmp plan.txt
              truncated_note=$'\n\n_Plan output truncated (first '"$max_bytes"' bytes); see the workflow run artifact / logs for the full plan._'
            fi
          else
            truncated_note=$'\n\n_No plan.txt produced (Terraform plan failed or did not write output)._'
          fi
          {
            echo "## Terraform Plan"
            echo
            echo "<details><summary>Show plan</summary>"
            echo
            echo '```hcl'
            cat plan.txt 2>/dev/null || true
            echo "$truncated_note"
            echo '```'
            echo
            echo "</details>"
          } > plan-comment.md

      - name: Find existing Terraform Plan comment
        if: always()
        id: find-plan-comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Terraform Plan'

      - name: Create or update Terraform Plan comment
        if: always()
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          comment-id: ${{ steps.find-plan-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: infra/plan-comment.md
          edit-mode: replace
