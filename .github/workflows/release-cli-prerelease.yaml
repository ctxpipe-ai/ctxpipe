name: Release CLI (prerelease)

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: npm dist-tag (never use "latest"; use Deploy workflow for stable releases)
        required: true
        default: beta
        type: string

concurrency:
  group: release-cli-prerelease

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish ctxpipe CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate dist-tag
        run: |
          if [ "${{ inputs.dist_tag }}" = "latest" ]; then
            echo "Refusing to publish with dist-tag latest. Merge the version PR on main for stable releases."
            exit 1
          fi

      - name: Validate prerelease version
        working-directory: packages/cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if ! echo "$VERSION" | grep -q '-'; then
            echo "packages/cli version must be a prerelease (e.g. 0.2.0-beta.0), got $VERSION"
            exit 1
          fi
          echo "Publishing ctxpipe@$VERSION with dist-tag ${{ inputs.dist_tag }}"

      - name: Build and test CLI
        run: |
          pnpm --filter ctxpipe build
          pnpm --filter ctxpipe test

      - name: Publish to npm
        working-directory: packages/cli
        run: npm publish --access public --tag "${{ inputs.dist_tag }}"
        env:
          NPM_CONFIG_PROVENANCE: true
