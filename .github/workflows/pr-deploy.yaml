name: PR Deploy

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  packages: write

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  build_pr_images:
    name: Build and Publish PR GHCR Images
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: apps/backend/Dockerfile
          - image: worker
            dockerfile: apps/backend/Dockerfile.worker
          - image: ui
            dockerfile: apps/ui/Dockerfile
          - image: codesearch
            dockerfile: apps/codesearch/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/ctxpipe-ai/${{ matrix.image }}:pr-${{ github.event.number }}-${{ github.sha }}

  create_neon_branch:
    name: Create Neon Branch
    needs: [setup, build_pr_images]
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: echo "expires_at=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ steps.get_expiration_date.outputs.expires_at }}

      - name: Run Migrations
        run: pnpm --filter @ctxpipe/backend db:migrate
        env:
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url }}

      - name: Set DATABASE_URL on Railway PR Environment
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          NEON_DB_URL: ${{ steps.create_neon_branch.outputs.db_url }}
        run: |
          npm install -g @railway/cli@latest
          railway link --project ${{ vars.RAILWAY_PROJECT_ID }} --environment ctxpipe-pr-${{ github.event.number }}
          echo "$NEON_DB_URL" | railway variable set DATABASE_URL --stdin -s ${{ vars.RAILWAY_BACKEND_SERVICE_ID }}
          echo "$NEON_DB_URL" | railway variable set DATABASE_URL --stdin -s ${{ vars.RAILWAY_WORKER_SERVICE_ID }}

  deploy_pr_images:
    name: Deploy PR Images to Railway PR Environment
    needs: [create_neon_branch]
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_PR_ENVIRONMENT_NAME: ctxpipe-pr-${{ github.event.number }}
      PR_IMAGE_TAG: pr-${{ github.event.number }}-${{ github.sha }}
    steps:
      - name: Update PR service images
        shell: bash
        run: |
          set -euo pipefail

          graphql() {
            local query="$1"
            local variables="$2"
            curl --fail-with-body --silent --show-error \
              -X POST "https://backboard.railway.com/graphql/v2" \
              -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(jq -cn --arg query "${query}" --argjson variables "${variables}" '{query: $query, variables: $variables}')"
          }

          project_query='query ProjectEnvironmentsAndServices($projectId: String!) {
            project(id: $projectId) {
              environments {
                edges {
                  node {
                    id
                    name
                  }
                }
              }
              services {
                edges {
                  node {
                    id
                    name
                  }
                }
              }
            }
          }'
          project_data="$(graphql "${project_query}" "$(jq -cn --arg projectId "${RAILWAY_PROJECT_ID}" '{projectId: $projectId}')")"

          environment_id="$(echo "${project_data}" | jq -r --arg envName "${RAILWAY_PR_ENVIRONMENT_NAME}" '.data.project.environments.edges[] | select(.node.name == $envName) | .node.id')"
          if [[ -z "${environment_id}" || "${environment_id}" == "null" ]]; then
            echo "Failed to resolve Railway PR environment ID for ${RAILWAY_PR_ENVIRONMENT_NAME}"
            echo "${project_data}" | jq
            exit 1
          fi

          backend_service_id="$(echo "${project_data}" | jq -r '.data.project.services.edges[] | select(.node.name == "ctx| - backend") | .node.id')"
          worker_service_id="$(echo "${project_data}" | jq -r '.data.project.services.edges[] | select(.node.name == "OpenWorkflow") | .node.id')"
          ui_service_id="$(echo "${project_data}" | jq -r '.data.project.services.edges[] | select(.node.name == "ctx| - ui") | .node.id')"
          codesearch_service_id="$(echo "${project_data}" | jq -r '.data.project.services.edges[] | select(.node.name == "CodeSearch") | .node.id')"

          for id in "${backend_service_id}" "${worker_service_id}" "${ui_service_id}" "${codesearch_service_id}"; do
            if [[ -z "${id}" || "${id}" == "null" ]]; then
              echo "Failed to resolve one or more Railway service IDs"
              echo "${project_data}" | jq
              exit 1
            fi
          done

          update_image_query='mutation ServiceInstanceUpdate($serviceId: String!, $environmentId: String!, $input: ServiceInstanceUpdateInput!) {
            serviceInstanceUpdate(serviceId: $serviceId, environmentId: $environmentId, input: $input)
          }'
          deploy_query='mutation ServiceInstanceDeployV2($serviceId: String!, $environmentId: String!) {
            serviceInstanceDeployV2(serviceId: $serviceId, environmentId: $environmentId)
          }'

          update_and_deploy_service_image() {
            local service_id="$1"
            local image="$2"
            echo "Updating service ${service_id} to image ${image}"
            graphql "${update_image_query}" "$(jq -cn \
              --arg environmentId "${environment_id}" \
              --arg serviceId "${service_id}" \
              --arg image "${image}" \
              '{environmentId: $environmentId, serviceId: $serviceId, input: {source: {image: $image}}}')"

            echo "Triggering deployment for service ${service_id}"
            graphql "${deploy_query}" "$(jq -cn \
              --arg environmentId "${environment_id}" \
              --arg serviceId "${service_id}" \
              '{environmentId: $environmentId, serviceId: $serviceId}')")"
          }

          update_and_deploy_service_image "${backend_service_id}" "ghcr.io/ctxpipe-ai/backend:${PR_IMAGE_TAG}"
          update_and_deploy_service_image "${worker_service_id}" "ghcr.io/ctxpipe-ai/worker:${PR_IMAGE_TAG}"
          update_and_deploy_service_image "${ui_service_id}" "ghcr.io/ctxpipe-ai/ui:${PR_IMAGE_TAG}"
          update_and_deploy_service_image "${codesearch_service_id}" "ghcr.io/ctxpipe-ai/codesearch:${PR_IMAGE_TAG}"

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
