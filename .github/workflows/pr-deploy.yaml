name: PR Deploy

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  packages: write

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
      pr_image_tag: pr-${{ github.event.number }}-${{ github.sha }}
      pr_environment_name: ctxpipe-pr-${{ github.event.number }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  build_pr_images:
    name: Build and Publish PR GHCR Images
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: apps/backend/Dockerfile
          - image: worker
            dockerfile: apps/backend/Dockerfile.worker
          - image: ui
            dockerfile: apps/ui/Dockerfile
          - image: codesearch
            dockerfile: apps/codesearch/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/ctxpipe-ai/${{ matrix.image }}:${{ needs.setup.outputs.pr_image_tag }}

  create_neon_branch:
    name: Create Neon Branch
    needs: [setup, build_pr_images]
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: echo "expires_at=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ steps.get_expiration_date.outputs.expires_at }}

      - name: Run Migrations
        run: pnpm --filter @ctxpipe/backend db:migrate
        env:
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url }}

  deploy_railway_pr_env:
    name: Deploy Railway PR Environment
    needs: [setup, build_pr_images, create_neon_branch]
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Set DATABASE_URL on Railway PR Environment
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          NEON_DB_URL: ${{ needs.create_neon_branch.outputs.db_url }}
        run: |
          npm install -g @railway/cli@latest
          railway link --project ${{ vars.RAILWAY_PROJECT_ID }} --environment ${{ needs.setup.outputs.pr_environment_name }}
          echo "$NEON_DB_URL" | railway variable set DATABASE_URL --stdin -s ${{ vars.RAILWAY_BACKEND_SERVICE_ID }}
          echo "$NEON_DB_URL" | railway variable set DATABASE_URL --stdin -s ${{ vars.RAILWAY_WORKER_SERVICE_ID }}

      - name: Pin PR image tags and trigger Railway deployments
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          PR_ENVIRONMENT_NAME: ${{ needs.setup.outputs.pr_environment_name }}
          PR_IMAGE_TAG: ${{ needs.setup.outputs.pr_image_tag }}
          RAILWAY_BACKEND_SERVICE_ID: ${{ vars.RAILWAY_BACKEND_SERVICE_ID }}
          RAILWAY_WORKER_SERVICE_ID: ${{ vars.RAILWAY_WORKER_SERVICE_ID }}
          RAILWAY_UI_SERVICE_ID: ${{ vars.RAILWAY_UI_SERVICE_ID }}
          RAILWAY_CODESEARCH_SERVICE_ID: ${{ vars.RAILWAY_CODESEARCH_SERVICE_ID }}
        run: |
          set -euo pipefail

          : "${RAILWAY_API_TOKEN:?Missing RAILWAY_API_TOKEN secret}"
          : "${RAILWAY_PROJECT_ID:?Missing RAILWAY_PROJECT_ID repository variable}"
          : "${PR_ENVIRONMENT_NAME:?Missing PR environment name output}"
          : "${PR_IMAGE_TAG:?Missing PR image tag output}"
          : "${RAILWAY_BACKEND_SERVICE_ID:?Missing RAILWAY_BACKEND_SERVICE_ID repository variable}"
          : "${RAILWAY_WORKER_SERVICE_ID:?Missing RAILWAY_WORKER_SERVICE_ID repository variable}"
          : "${RAILWAY_UI_SERVICE_ID:?Missing RAILWAY_UI_SERVICE_ID repository variable}"
          : "${RAILWAY_CODESEARCH_SERVICE_ID:?Missing RAILWAY_CODESEARCH_SERVICE_ID repository variable}"

          railway_graphql() {
            local query="$1"
            local variables_json="$2"
            curl --fail-with-body --silent --show-error \
              --request POST \
              --url https://backboard.railway.com/graphql/v2 \
              --header "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "$(jq -cn --arg q "$query" --argjson v "$variables_json" '{query: $q, variables: $v}')"
          }

          graphql_has_errors() {
            local response="$1"
            [[ "$(echo "$response" | jq '.errors // [] | length')" != "0" ]]
          }

          find_environment_id() {
            local response
            local environment_id

            response="$(railway_graphql \
              'query GetProjectEnvironments($projectId: String!) { project(id: $projectId) { environments { edges { node { id name } } } } }' \
              "$(jq -cn --arg projectId "$RAILWAY_PROJECT_ID" '{projectId: $projectId}')" \
            )"

            if ! graphql_has_errors "$response"; then
              environment_id="$(echo "$response" | jq -r --arg name "$PR_ENVIRONMENT_NAME" '.data.project.environments.edges[]?.node | select(.name == $name) | .id' | head -n 1)"
              if [[ -n "$environment_id" && "$environment_id" != "null" ]]; then
                echo "$environment_id"
                return 0
              fi
            fi

            response="$(railway_graphql \
              'query GetEnvironments($projectId: String!) { environments(projectId: $projectId) { edges { node { id name } } } }' \
              "$(jq -cn --arg projectId "$RAILWAY_PROJECT_ID" '{projectId: $projectId}')" \
            )"

            if ! graphql_has_errors "$response"; then
              environment_id="$(echo "$response" | jq -r --arg name "$PR_ENVIRONMENT_NAME" '.data.environments.edges[]?.node | select(.name == $name) | .id' | head -n 1)"
              if [[ -n "$environment_id" && "$environment_id" != "null" ]]; then
                echo "$environment_id"
                return 0
              fi
            fi

            echo "Unable to resolve Railway environment id for ${PR_ENVIRONMENT_NAME}" >&2
            echo "$response" | jq .
            return 1
          }

          update_service_source_image() {
            local environment_id="$1"
            local service_id="$2"
            local image="$3"

            local response
            local payload_with_source_object
            local payload_with_source_image
            local payload_with_image

            payload_with_source_object="$(jq -cn \
              --arg environmentId "$environment_id" \
              --arg serviceId "$service_id" \
              --arg image "$image" \
              '{environmentId: $environmentId, serviceId: $serviceId, input: {source: {image: $image}}}' \
            )"
            payload_with_source_image="$(jq -cn \
              --arg environmentId "$environment_id" \
              --arg serviceId "$service_id" \
              --arg image "$image" \
              '{environmentId: $environmentId, serviceId: $serviceId, input: {sourceImage: $image}}' \
            )"
            payload_with_image="$(jq -cn \
              --arg environmentId "$environment_id" \
              --arg serviceId "$service_id" \
              --arg image "$image" \
              '{environmentId: $environmentId, serviceId: $serviceId, input: {image: $image}}' \
            )"

            response="$(railway_graphql \
              'mutation ServiceInstanceUpdate($environmentId: String, $serviceId: String!, $input: ServiceInstanceUpdateInput!) { serviceInstanceUpdate(environmentId: $environmentId, serviceId: $serviceId, input: $input) }' \
              "$payload_with_source_object" \
            )"
            if ! graphql_has_errors "$response"; then
              return 0
            fi

            response="$(railway_graphql \
              'mutation ServiceInstanceUpdate($environmentId: String, $serviceId: String!, $input: ServiceInstanceUpdateInput!) { serviceInstanceUpdate(environmentId: $environmentId, serviceId: $serviceId, input: $input) }' \
              "$payload_with_source_image" \
            )"
            if ! graphql_has_errors "$response"; then
              return 0
            fi

            response="$(railway_graphql \
              'mutation ServiceInstanceUpdate($environmentId: String, $serviceId: String!, $input: ServiceInstanceUpdateInput!) { serviceInstanceUpdate(environmentId: $environmentId, serviceId: $serviceId, input: $input) }' \
              "$payload_with_image" \
            )"
            if ! graphql_has_errors "$response"; then
              return 0
            fi

            echo "Failed to update image source for service ${service_id}" >&2
            echo "$response" | jq .
            return 1
          }

          deploy_service_instance() {
            local environment_id="$1"
            local service_id="$2"
            local response
            local payload

            payload="$(jq -cn \
              --arg environmentId "$environment_id" \
              --arg serviceId "$service_id" \
              '{environmentId: $environmentId, serviceId: $serviceId}' \
            )"

            response="$(railway_graphql \
              'mutation ServiceInstanceDeployV2($environmentId: String!, $serviceId: String!) { serviceInstanceDeployV2(environmentId: $environmentId, serviceId: $serviceId) }' \
              "$payload" \
            )"
            if ! graphql_has_errors "$response"; then
              return 0
            fi

            response="$(railway_graphql \
              'mutation ServiceInstanceRedeploy($environmentId: String!, $serviceId: String!) { serviceInstanceRedeploy(environmentId: $environmentId, serviceId: $serviceId) }' \
              "$payload" \
            )"
            if ! graphql_has_errors "$response"; then
              return 0
            fi

            response="$(railway_graphql \
              'mutation ServiceInstanceDeploy($environmentId: String!, $serviceId: String!) { serviceInstanceDeploy(environmentId: $environmentId, serviceId: $serviceId) }' \
              "$payload" \
            )"
            if ! graphql_has_errors "$response"; then
              return 0
            fi

            echo "Failed to trigger deployment for service ${service_id}" >&2
            echo "$response" | jq .
            return 1
          }

          environment_id="$(find_environment_id)"
          echo "Resolved Railway environment '${PR_ENVIRONMENT_NAME}' to id '${environment_id}'."

          services=(
            "backend:${RAILWAY_BACKEND_SERVICE_ID}:ghcr.io/ctxpipe-ai/backend:${PR_IMAGE_TAG}"
            "worker:${RAILWAY_WORKER_SERVICE_ID}:ghcr.io/ctxpipe-ai/worker:${PR_IMAGE_TAG}"
            "ui:${RAILWAY_UI_SERVICE_ID}:ghcr.io/ctxpipe-ai/ui:${PR_IMAGE_TAG}"
            "codesearch:${RAILWAY_CODESEARCH_SERVICE_ID}:ghcr.io/ctxpipe-ai/codesearch:${PR_IMAGE_TAG}"
          )

          for service in "${services[@]}"; do
            IFS=":" read -r service_name service_id image <<<"$service"
            echo "Updating ${service_name} (${service_id}) to ${image}"
            update_service_source_image "$environment_id" "$service_id" "$image"
            echo "Triggering deployment for ${service_name} (${service_id})"
            deploy_service_instance "$environment_id" "$service_id"
          done


  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
