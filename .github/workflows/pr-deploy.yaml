name: PR Deploy

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  build_pr_images:
    name: Build and Publish PR GHCR Images
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: apps/backend/Dockerfile
          - image: worker
            dockerfile: apps/backend/Dockerfile.worker
          - image: ui
            dockerfile: apps/ui/Dockerfile
          - image: codesearch
            dockerfile: apps/codesearch/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/ctxpipe-ai/${{ matrix.image }}:pr-${{ github.event.number }}-${{ github.sha }}

  deploy_pr_environment:
    name: Deploy PR environment (Railway + Neon)
    needs: [build_pr_images]
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      PR_ENV: pr-${{ github.event.number }}
      IMAGE_TAG: pr-${{ github.event.number }}-${{ github.sha }}
    outputs:
      env_id: ${{ steps.preview_urls.outputs.env_id }}
      backend_url: ${{ steps.preview_urls.outputs.backend_url }}
      dashboard_url: ${{ steps.preview_urls.outputs.dashboard_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.35.2

      - name: Ensure Railway PR environment exists
        run: |
          set -euo pipefail
          railway link --project "${{ vars.RAILWAY_PROJECT_ID }}" --environment production
          if railway environment config --environment "$PR_ENV" --json >/dev/null 2>&1; then
            echo "Railway environment $PR_ENV already exists"
          else
            railway environment new "$PR_ENV" --duplicate production
          fi
          railway link --project "${{ vars.RAILWAY_PROJECT_ID }}" --environment "$PR_ENV"

      - name: Neon branch expiration (14 days)
        id: neon_expires
        run: echo "expires_at=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Create Neon branch
        id: neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          parent_branch: production
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ steps.neon_expires.outputs.expires_at }}

      - name: Install dependencies and run migrations
        run: pnpm install --frozen-lockfile && pnpm --filter @ctxpipe/backend db:migrate
        env:
          DATABASE_URL: ${{ steps.neon_branch.outputs.db_url }}

      - name: Apply Railway service images and DATABASE_URL (single deploy)
        env:
          DATABASE_URL: ${{ steps.neon_branch.outputs.db_url }}
        run: |
          set -euo pipefail
          railway link --project "${{ vars.RAILWAY_PROJECT_ID }}" --environment "$PR_ENV"
          IMG_UI="ghcr.io/ctxpipe-ai/ui:${IMAGE_TAG}"
          IMG_BACKEND="ghcr.io/ctxpipe-ai/backend:${IMAGE_TAG}"
          IMG_CODESEARCH="ghcr.io/ctxpipe-ai/codesearch:${IMAGE_TAG}"
          IMG_WORKER="ghcr.io/ctxpipe-ai/worker:${IMAGE_TAG}"
          # Non-interactive runs: Railway CLI reads environment config from stdin first and
          # skips --service-config flags, so pipe a JSON patch (see `get_edit_config` in railwayapp/cli).
          jq -n \
            --arg ui_img "$IMG_UI" \
            --arg be_img "$IMG_BACKEND" \
            --arg cs_img "$IMG_CODESEARCH" \
            --arg ow_img "$IMG_WORKER" \
            --arg db "$DATABASE_URL" \
            '{
              services: {
                ui: { source: { image: $ui_img } },
                backend: {
                  source: { image: $be_img },
                  variables: { DATABASE_URL: { value: $db } }
                },
                codesearch: {
                  source: { image: $cs_img },
                  variables: { DATABASE_URL: { value: $db } }
                },
                openworkflow: {
                  source: { image: $ow_img },
                  variables: { DATABASE_URL: { value: $db } }
                }
              }
            }' \
            | railway environment edit \
              --environment "$PR_ENV" \
              -m "PR #${{ github.event.number }}: preview DB + images ${{ github.sha }}"

      - name: Resolve dashboard URL and backend public URL
        id: preview_urls
        run: |
          set -euo pipefail
          # Railway CLI echoes wizard lines to stdout before JSON; jq must see JSON only.
          LINK_JSON=$(railway link --project "${{ vars.RAILWAY_PROJECT_ID }}" --environment "$PR_ENV" --json | sed -n '/^{/,$p')
          ENV_ID=""
          if [[ -n "$LINK_JSON" ]]; then
            ENV_ID=$(echo "$LINK_JSON" | jq -r '.environmentId // empty')
          fi
          STATUS_JSON=$(railway status --json | sed -n '/^{/,$p')
          BACKEND_ID=""
          if [[ -n "$STATUS_JSON" ]]; then
            BACKEND_ID=$(echo "$STATUS_JSON" | jq -r '
              [.services.edges[]? | select(.node.name == "backend") | .node.id] | first // empty
            ')
          fi
          BACKEND_URL=""
          for _ in 1 2 3 4 5 6; do
            CONFIG_JSON=$(railway environment config --environment "$PR_ENV" --json | sed -n '/^{/,$p')
            if [[ -n "$BACKEND_ID" && -n "$CONFIG_JSON" ]]; then
              D=$(echo "$CONFIG_JSON" | jq -r --arg id "$BACKEND_ID" '
                .services[$id].networking.service_domains // {} | keys | .[0] // empty
              ')
              if [[ -n "$D" && "$D" != "null" ]]; then
                BACKEND_URL="$D"
                break
              fi
            fi
            sleep 20
          done
          if [[ -n "$BACKEND_URL" && "$BACKEND_URL" != https://* ]]; then
            BACKEND_URL="https://${BACKEND_URL}"
          fi
          DASHBOARD_URL="https://railway.com/project/${{ vars.RAILWAY_PROJECT_ID }}"
          if [[ -n "$ENV_ID" ]]; then
            DASHBOARD_URL="https://railway.com/project/${{ vars.RAILWAY_PROJECT_ID }}/environment/${ENV_ID}"
          fi
          {
            echo "env_id<<EOF"
            echo "$ENV_ID"
            echo "EOF"
            echo "backend_url<<EOF"
            echo "$BACKEND_URL"
            echo "EOF"
            echo "dashboard_url<<EOF"
            echo "$DASHBOARD_URL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  comment_pr_preview:
    name: PR preview comment
    needs: [deploy_pr_environment]
    if: |
      needs.deploy_pr_environment.result == 'success' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-railway-preview
          message: |
            ### PR preview (Railway + Neon)

            | Link | URL |
            |------|-----|
            | Railway dashboard | ${{ needs.deploy_pr_environment.outputs.dashboard_url }} |
            | Backend (public URL) | ${{ needs.deploy_pr_environment.outputs.backend_url != '' && needs.deploy_pr_environment.outputs.backend_url || '*(empty — wait for deploy or check Railway)*' }} |

            Environment: `pr-${{ github.event.number }}` · Neon branch: `preview/pr-${{ github.event.number }}`

  cleanup_pr_environment:
    name: Cleanup Neon branch and Railway environment
    if: |
      github.event_name == 'pull_request' && github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
    steps:
      - name: Delete Neon branch
        run: |
          set -euo pipefail
          PROJECT_ID="${{ vars.NEON_PROJECT_ID }}"
          BRANCH_NAME="preview/pr-${{ github.event.number }}"
          API="https://console.neon.tech/api/v2"
          RESP=$(curl -fsS -H "Authorization: Bearer ${NEON_API_KEY}" \
            "${API}/projects/${PROJECT_ID}/branches")
          BID=$(echo "$RESP" | jq -r --arg n "$BRANCH_NAME" '.branches[]? | select(.name == $n) | .id' | head -1)
          if [[ -z "$BID" ]]; then
            echo "Neon branch not found (already deleted?): $BRANCH_NAME"
            exit 0
          fi
          curl -fsS -X DELETE -H "Authorization: Bearer ${NEON_API_KEY}" \
            "${API}/projects/${PROJECT_ID}/branches/${BID}"
          echo "Deleted Neon branch $BRANCH_NAME"

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.35.2

      - name: Delete Railway environment
        run: |
          set -euo pipefail
          railway link --project "${{ vars.RAILWAY_PROJECT_ID }}" --environment production
          railway environment delete "pr-${{ github.event.number }}" --yes || echo "Railway environment delete skipped or already removed"
