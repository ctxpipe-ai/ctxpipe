name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main

permissions:
  contents: read
  packages: write

jobs:
  build_images:
    name: Build and Publish GHCR Images
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: apps/backend/Dockerfile
          - image: worker
            dockerfile: apps/backend/Dockerfile.worker
          - image: ui
            dockerfile: apps/ui/Dockerfile
          - image: codesearch
            dockerfile: apps/codesearch/Dockerfile
          - image: otel-collector
            dockerfile: apps/otel-collector/Dockerfile
    steps:
      - name: Checkout repository
        uses: useblacksmith/checkout@v1

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/ctxpipe-ai/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/ctxpipe-ai/${{ matrix.image }}:latest

  migrate_production_db:
    name: Migrate Production Database
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
    steps:
      - name: Checkout repository
        uses: useblacksmith/checkout@v1

      - uses: pnpm/action-setup@v4

      - name: Mount pnpm store (sticky disk)
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-pnpm-store
          path: ~/.pnpm-store

      - uses: useblacksmith/setup-node@v5
        with:
          node-version: "22"

      - name: Ensure pnpm store path
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations
        working-directory: apps/backend
        run: pnpm exec drizzle-kit migrate

  terraform:
    name: Terraform Init/Plan/Apply
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    needs:
      - build_images
      - migrate_production_db
    defaults:
      run:
        working-directory: infra

    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_image_tag: ${{ github.sha }}
      TF_VAR_source_image_registry_username: ${{ secrets.GHCR_USERNAME }}
      TF_VAR_source_image_registry_password: ${{ secrets.GHCR_PASSWORD }}
      TF_VAR_better_auth_secret: ${{ secrets.BETTER_AUTH_SECRET }}
      TF_VAR_langsmith_api_key: ${{ secrets.LANGSMITH_API_KEY }}
      TF_VAR_model_provider_api_key: ${{ secrets.MODEL_PROVIDER_API_KEY }}
      TF_VAR_smtp_connection_url: ${{ secrets.SMTP_CONNECTION_URL }}
      TF_VAR_github_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      TF_VAR_github_client_secret: ${{ secrets.GH_CLIENT_SECRET }}
      TF_VAR_github_webhook_secret: ${{ secrets.GH_WEBHOOK_SECRET }}
      TF_VAR_atlassian_client_id: ${{ secrets.ATLASSIAN_CLIENT_ID }}
      TF_VAR_atlassian_client_secret: ${{ secrets.ATLASSIAN_CLIENT_SECRET }}
      TF_VAR_falkordb_password: ${{ secrets.FALKORDB_PASSWORD }}
      TF_VAR_better_stack_token: ${{ secrets.BETTER_STACK_TOKEN }}
      TF_VAR_langfuse_auth_string: ${{ secrets.LANGFUSE_AUTH_STRING }}
      TF_VAR_langfuse_otlp_endpoint: ${{ secrets.LANGFUSE_OTLP_ENDPOINT }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

    steps:
      - name: Checkout repository
        uses: useblacksmith/checkout@v1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Terraform Init
        run: terraform init -backend-config="access_key=$R2_ACCESS_KEY_ID" -backend-config="secret_key=$R2_SECRET_ACCESS_KEY" -backend-config="key=production/terraform.tfstate"

      - name: Terraform Plan
        run: terraform plan --out=terraform.plan

      - name: Terraform Apply
        run: terraform apply -auto-approve terraform.plan

  forge_deploy:
    name: Deploy Forge app (production)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    needs: terraform

    steps:
      - name: Checkout repository
        uses: useblacksmith/checkout@v1

      - uses: pnpm/action-setup@v4

      - name: Mount pnpm store (sticky disk)
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-pnpm-store
          path: ~/.pnpm-store

      - uses: useblacksmith/setup-node@v5
        with:
          node-version: "22"

      - name: Ensure pnpm store path
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Forge lint
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
        run: pnpm --filter @ctxpipe/forge-ctxpipe-agent exec forge lint

      - name: Deploy to Forge production
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
        run: pnpm --filter @ctxpipe/forge-ctxpipe-agent run deploy:prod
