name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish from
        default: main
        type: string
      dist_tag:
        description: npm dist-tag for snapshot prerelease
        default: next
        type: choice
        options:
          - next
          - canary
          - beta

concurrency:
  group: deploy-main

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build_images:
    name: Build and Publish GHCR Images
    if: github.event_name != 'workflow_dispatch'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: apps/backend/Dockerfile
          - image: worker
            dockerfile: apps/backend/Dockerfile.worker
          - image: ui
            dockerfile: apps/ui/Dockerfile
          - image: codesearch
            dockerfile: apps/codesearch/Dockerfile
          - image: otel-collector
            dockerfile: apps/otel-collector/Dockerfile
    steps:
      - name: Checkout repository
        uses: useblacksmith/checkout@v1

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/ctxpipe-ai/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/ctxpipe-ai/${{ matrix.image }}:latest

  release:
    name: Release
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - build_images
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}

  migrate_production_db:
    name: Migrate Production Database
    if: github.event_name != 'workflow_dispatch'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
    steps:
      - name: Checkout repository
        uses: useblacksmith/checkout@v1

      - uses: pnpm/action-setup@v4

      - name: Mount pnpm store (sticky disk)
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-pnpm-store
          path: ~/.pnpm-store

      - uses: useblacksmith/setup-node@v5
        with:
          node-version: "22"

      - name: Ensure pnpm store path
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations
        working-directory: apps/backend
        run: pnpm exec drizzle-kit migrate

  terraform:
    name: Terraform Init/Plan/Apply
    if: github.event_name != 'workflow_dispatch'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    needs:
      - build_images
      - migrate_production_db
    defaults:
      run:
        working-directory: infra

    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_image_tag: ${{ github.sha }}
      TF_VAR_better_auth_secret: ${{ secrets.BETTER_AUTH_SECRET }}
      TF_VAR_langsmith_api_key: ${{ secrets.LANGSMITH_API_KEY }}
      TF_VAR_model_provider_api_key: ${{ secrets.MODEL_PROVIDER_API_KEY }}
      TF_VAR_model_provider: ${{ vars.MODEL_PROVIDER || 'openrouter' }}
      TF_VAR_smtp_connection_url: ${{ secrets.SMTP_CONNECTION_URL }}
      TF_VAR_github_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      TF_VAR_github_client_secret: ${{ secrets.GH_CLIENT_SECRET }}
      TF_VAR_github_webhook_secret: ${{ secrets.GH_WEBHOOK_SECRET }}
      TF_VAR_atlassian_client_id: ${{ secrets.ATLASSIAN_CLIENT_ID }}
      TF_VAR_atlassian_client_secret: ${{ secrets.ATLASSIAN_CLIENT_SECRET }}
      TF_VAR_falkordb_password: ${{ secrets.FALKORDB_PASSWORD }}
      TF_VAR_better_stack_token: ${{ secrets.BETTER_STACK_TOKEN }}
      TF_VAR_langfuse_auth_string: ${{ secrets.LANGFUSE_AUTH_STRING }}
      TF_VAR_langfuse_otlp_endpoint: ${{ secrets.LANGFUSE_OTLP_ENDPOINT }}
      TF_VAR_amplitude_api_key: ${{ secrets.AMPLITUDE_API_KEY }}
      TF_VAR_amplitude_region: ${{ secrets.AMPLITUDE_REGION || 'us' }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

    steps:
      - name: Checkout repository
        uses: useblacksmith/checkout@v1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Terraform Init
        run: terraform init -backend-config="access_key=$R2_ACCESS_KEY_ID" -backend-config="secret_key=$R2_SECRET_ACCESS_KEY" -backend-config="key=production/terraform.tfstate"

      - name: Terraform Plan
        run: terraform plan --out=terraform.plan

      - name: Terraform Apply
        run: terraform apply -auto-approve terraform.plan

  forge_deploy:
    name: Deploy Forge app (production)
    if: github.event_name != 'workflow_dispatch'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    needs: terraform

    steps:
      - name: Checkout repository
        uses: useblacksmith/checkout@v1

      - uses: pnpm/action-setup@v4

      - name: Mount pnpm store (sticky disk)
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-pnpm-store
          path: ~/.pnpm-store

      - uses: useblacksmith/setup-node@v5
        with:
          node-version: "22"

      - name: Ensure pnpm store path
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Forge CLI for CI
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
          FORGE_DISABLE_ANALYTICS: "1"
        run: pnpm --filter @ctxpipe/forge-ctxpipe-agent run prepare-forge-cli

      - name: Forge lint
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
          FORGE_DISABLE_ANALYTICS: "1"
          REMOTE_BASE_URL: https://app.ctxpipe.ai/
        run: pnpm --filter @ctxpipe/forge-ctxpipe-agent run lint:forge

      - name: Deploy to Forge production
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
          FORGE_DISABLE_ANALYTICS: "1"
        run: pnpm --filter @ctxpipe/forge-ctxpipe-agent run deploy:prod

  prerelease:
    name: Prerelease
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish snapshot prerelease
        run: IMAGE_TAG="$(git rev-parse HEAD)" pnpm ci:prerelease
        env:
          SNAPSHOT_TAG: ${{ inputs.dist_tag }}
