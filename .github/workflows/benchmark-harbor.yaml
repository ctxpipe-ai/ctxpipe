name: Harbor Benchmark

on:
  pull_request:
    branches:
      - main
    paths:
      - "benchmarks/**"
      - ".github/workflows/benchmark-harbor.yaml"
  workflow_dispatch:
    inputs:
      run_scored:
        description: "Run scored cursor-cli benchmark jobs"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  oracle-smoke:
    name: Oracle smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Harbor CLI
        run: |
          python -m pip install --upgrade pip uv
          uv tool install harbor
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Harbor oracle smoke
        run: harbor run -c benchmarks/jobs/oracle-smoke.yaml

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harbor-oracle-smoke
          path: jobs/benchmarks
          if-no-files-found: ignore

  scored-benchmark:
    name: Scored benchmark
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_scored == 'true'
    runs-on: ubuntu-latest
    env:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      CTXPIPE_MCP_URL: ${{ secrets.CTXPIPE_MCP_URL }}
      CTXPIPE_API_TOKEN: ${{ secrets.CTXPIPE_API_TOKEN }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Harbor CLI
        run: |
          python -m pip install --upgrade pip uv
          uv tool install harbor
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate required secrets
        run: |
          test -n "${CURSOR_API_KEY}" || (echo "CURSOR_API_KEY is required" && exit 1)
          test -n "${CTXPIPE_MCP_URL}" || (echo "CTXPIPE_MCP_URL is required" && exit 1)
          test -n "${CTXPIPE_API_TOKEN}" || (echo "CTXPIPE_API_TOKEN is required" && exit 1)

      - name: Preflight hosted MCP
        run: benchmarks/scripts/preflight-mcp.sh

      - name: Run baseline cursor-cli arm
        run: harbor run -c benchmarks/jobs/baseline-cursor.yaml

      - name: Run ctxpipe cursor-cli arm
        run: harbor run -c benchmarks/jobs/ctxpipe-cursor.yaml

      - name: Upload scored artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harbor-scored-runs
          path: jobs/benchmarks
          if-no-files-found: ignore
