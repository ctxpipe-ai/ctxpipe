name: Terraform Infra Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: terraform-infra-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: infra

jobs:
  terraform:
    name: Terraform Init/Plan/Apply
    runs-on: ubuntu-latest

    env:
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Terraform Init
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: terraform init -backend-config="access_key=$R2_ACCESS_KEY_ID" -backend-config="secret_key=$R2_SECRET_ACCESS_KEY" -backend-config="key=production/terraform.tfstate"

      - name: Terraform Plan
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: terraform plan --out=terraform.plan

      - name: Terraform Apply
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: terraform apply terraform.plan -auto-approve
