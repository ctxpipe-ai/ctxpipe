name: Release Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Changesets Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b # v1

      - uses: pnpm/action-setup@v4.4.0

      - name: Mount pnpm store (sticky disk)
        uses: useblacksmith/stickydisk@v1.2.0
        with:
          key: ${{ github.repository }}-pnpm-store
          path: ~/.pnpm-store

      - uses: useblacksmith/setup-node@v5.0.4
        with:
          node-version: "22"

      - name: Ensure pnpm store path
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Configure npm auth for npmjs
        run: |
          echo "@ctxpipe:registry=https://registry.npmjs.org" >> ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable package
        run: pnpm turbo build --filter @ctxpipe/aws-cdk

      - name: Test publishable package
        run: pnpm --filter @ctxpipe/aws-cdk test --if-present

      - name: Create release PR or publish
        uses: changesets/action@v1.8.0
        with:
          version: pnpm ci:version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
