name: Release Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Changesets Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: useblacksmith/checkout@v1

      - uses: pnpm/action-setup@v4

      - name: Mount pnpm store (sticky disk)
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-pnpm-store
          path: ~/.pnpm-store

      - uses: useblacksmith/setup-node@v5
        with:
          node-version: "22"

      - name: Ensure pnpm store path
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Configure npm auth for GitHub Packages
        run: |
          echo "@ctxpipe-ai:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable package
        run: pnpm turbo build --filter @ctxpipe-ai/aws-cdk

      - name: Test publishable package
        run: pnpm --filter @ctxpipe-ai/aws-cdk test --if-present

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
