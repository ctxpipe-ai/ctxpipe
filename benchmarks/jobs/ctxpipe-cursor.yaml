job_name: benchmark-ctxpipe-cursor
jobs_dir: jobs/benchmarks
n_concurrent_trials: 1
quiet: false
agents:
  - import_path: benchmarks.agents.ctxpipe_cursor:CtxpipeCursorCliAgent
    model_name: anthropic/claude-sonnet-4-6
    env:
      CURSOR_API_KEY: ${CURSOR_API_KEY}
      CTXPIPE_MCP_URL: ${CTXPIPE_MCP_URL}
      CTXPIPE_API_TOKEN: ${CTXPIPE_API_TOKEN}
tasks:
  - path: benchmarks/tasks/ctxpipe/boxyhq-env-bridge
