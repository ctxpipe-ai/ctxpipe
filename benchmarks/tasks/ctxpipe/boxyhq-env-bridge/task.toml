schema_version = "1.0"

[task]
name = "ctxpipe/boxyhq-env-bridge"
description = "Cross-repo SSO env bridge for BoxyHQ starter kit and Ory Polis."
keywords = ["boxyhq", "sso", "polis", "rewardkit", "org-context", "mcp"]

[metadata]
difficulty = "medium"
category = "programming"
tags = ["benchmark", "harbor", "ctxpipe", "cross-repo"]

[environment]
cpus = 2
memory_mb = 4096
storage_mb = 10240
allow_internet = true

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 120.0
