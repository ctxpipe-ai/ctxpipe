schema_version = "1.0"

[task]
name = "ctxpipe/boxyhq-env-bridge-ctxpipe"
description = "Cross-repo SSO env bridge via hosted ctxpipe MCP (no local repo checkout)."
keywords = ["boxyhq", "sso", "polis", "rewardkit", "org-context", "mcp"]

[metadata]
difficulty = "medium"
category = "programming"
tags = ["benchmark", "harbor", "ctxpipe", "cross-repo", "mcp"]

[environment]
cpus = 2
memory_mb = 4096
storage_mb = 10240
# Cursor CLI runs inside the trial container; MCP needs HTTPS to the hosted ctxpipe URL.
allow_internet = true

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 120.0
