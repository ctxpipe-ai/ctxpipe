schema_version = "1.0"

[task]
name = "ctxpipe/storage-decision-ctxpipe"
description = "Cross-repo storage architecture decision benchmark via hosted ctxpipe MCP."
keywords = ["grafana", "storage", "decision", "rewardkit", "org-context", "ctxpipe", "mcp"]

[metadata]
difficulty = "hard"
category = "programming"
tags = ["benchmark", "harbor", "ctxpipe", "decision", "mcp", "artifact"]

[environment]
cpus = 2
memory_mb = 4096
storage_mb = 10240
# Cursor CLI runs inside the trial container and must reach the hosted MCP endpoint.
allow_internet = true

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 120.0
